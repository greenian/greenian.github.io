    <script>
        $( function() {
            var $grid = $('.grid').isotope({
                itemSelector: 'article'
            });

            // filter buttons
            $('.filters-button-group').on( 'click', 'button', function() {
                var filterValue = $( this ).attr('data-filter');
                $grid.isotope({ filter: filterValue });
            });
            $('.button-group').each( function( i, buttonGroup ) {
                var $buttonGroup = $( buttonGroup );
                $buttonGroup.on( 'click', 'button', function() {
                $buttonGroup.find('.is-checked').removeClass('is-checked');
                $( this ).addClass('is-checked');
                });
            });

            $(window).on('load', function() {
                $grid.isotope('layout');
            });
            });

            // debounce so filtering doesn't happen every millisecond
            function debounce( fn, threshold ) {
            var timeout;
            return function debounced() {
                if ( timeout ) {
                clearTimeout( timeout );
                }
                function delayed() {
                fn();
                timeout = null;
                }
                timeout = setTimeout( delayed, threshold || 100 );
            }
            }
    </script>
    <script>
        const collapseElement = document.getElementById('awestruck-desc');

        collapseElement.addEventListener('show.bs.collapse', function (e) {
        // Check if the trigger element (the button) has the .active class
        const activeTrigger = e.relatedTarget;
        
        if (activeTrigger && activeTrigger.classList.contains('is-checked')) {
            e.preventDefault(); // Stop the collapse from opening
        }
        });
